<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>
  <text x="800" y="54" text-anchor="middle" font-size="30" font-weight="700" fill="#E5E7EB">Stardust per run — with and without compounding meta-upgrades</text>
  <text x="800" y="86" text-anchor="middle" font-size="17" fill="#6B7280">The gap is the value of the meta-tree</text>

  <!-- Plot area: x 180..1480 (width 1300), y 140..780 (height 640). Bottom-left origin -->
  <!-- Axes -->
  <g stroke="#6B7280" stroke-width="1" fill="none">
    <line x1="180" y1="780" x2="1480" y2="780"/>
    <line x1="180" y1="140" x2="180" y2="780"/>
  </g>

  <!-- Horizontal grid lines at quarters -->
  <g stroke="#6B7280" stroke-width="0.5" opacity="0.5" stroke-dasharray="4 4">
    <line x1="180" y1="300" x2="1480" y2="300"/>
    <line x1="180" y1="460" x2="1480" y2="460"/>
    <line x1="180" y1="620" x2="1480" y2="620"/>
  </g>

  <!-- X-axis ticks: run 0, 5, 10, 15, 20, 25 → 6 ticks over 1300px: step 260 -->
  <g font-size="14" fill="#6B7280">
    <text x="180" y="810" text-anchor="middle">0</text>
    <text x="440" y="810" text-anchor="middle">5</text>
    <text x="700" y="810" text-anchor="middle">10</text>
    <text x="960" y="810" text-anchor="middle">15</text>
    <text x="1220" y="810" text-anchor="middle">20</text>
    <text x="1480" y="810" text-anchor="middle">25</text>
    <text x="830" y="845" text-anchor="middle" font-size="16" fill="#E5E7EB">Prestige run number</text>
  </g>

  <!-- Y-axis ticks (log-scale labels) -->
  <g font-size="14" fill="#6B7280">
    <text x="165" y="785" text-anchor="end">1</text>
    <text x="165" y="625" text-anchor="end">10</text>
    <text x="165" y="465" text-anchor="end">100</text>
    <text x="165" y="305" text-anchor="end">1 k</text>
    <text x="165" y="145" text-anchor="end">10 k</text>
    <text x="60" y="460" text-anchor="middle" font-size="16" fill="#E5E7EB" transform="rotate(-90 60 460)">Stardust earned per run (log scale)</text>
  </g>

  <!-- Baseline: fixed-skill (no meta) ≈ constant y ~ 620 (value ≈ 10) with mild noise -->
  <polyline fill="none" stroke="#EF4444" stroke-width="3" stroke-dasharray="8 6"
    points="180,630 284,628 388,624 492,626 596,622 700,624 804,620 908,621 1012,618 1116,619 1220,616 1324,618 1428,614 1480,612"/>
  <text x="1490" y="612" font-size="15" fill="#EF4444" font-weight="700">Baseline (no meta)</text>

  <!-- Compounding curve: exponential growth on log scale is linear. From (180,630) → (1480,160)
       linear in log space. -->
  <polyline fill="none" stroke="#10B981" stroke-width="4"
    points="180,630 232,610 284,588 336,564 388,540 440,514 492,488 544,462 596,436 648,410 700,384 752,358 804,332 856,306 908,282 960,258 1012,234 1064,214 1116,196 1168,180 1220,168 1272,160 1324,156 1376,154 1428,152 1480,152"/>
  <text x="1490" y="152" font-size="15" fill="#10B981" font-weight="700">With meta-upgrades</text>

  <!-- Early runs callout -->
  <circle cx="284" cy="610" r="6" fill="#10B981"/>
  <circle cx="284" cy="628" r="6" fill="#EF4444"/>
  <line x1="284" y1="610" x2="284" y2="628" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="300" y="660" font-size="13" fill="#6B7280">tiny gap early</text>

  <!-- Late runs callout: arrow + gap bracket -->
  <line x1="1220" y1="168" x2="1220" y2="616" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1240" y="420" font-size="15" fill="#E5E7EB" font-weight="700">meta-tree value</text>
  <text x="1240" y="442" font-size="13" fill="#6B7280">diverges by orders of magnitude</text>

  <!-- Legend -->
  <rect x="220" y="160" width="360" height="120" rx="10" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <line x1="240" y1="195" x2="290" y2="195" stroke="#EF4444" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="300" y="200" font-size="14" fill="#E5E7EB">Baseline — skill fixed, no carry-over</text>
  <line x1="240" y1="235" x2="290" y2="235" stroke="#10B981" stroke-width="4"/>
  <text x="300" y="240" font-size="14" fill="#E5E7EB">Meta-upgrades — each run invests in the next</text>
  <text x="240" y="268" font-size="12" fill="#6B7280">Shape is typical log-linear; actual tuning is per-game.</text>
</svg>
