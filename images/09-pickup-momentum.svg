<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>
  <text x="800" y="54" text-anchor="middle" font-size="30" font-weight="700" fill="#E5E7EB">Perfectly inelastic pickup — momentum merges</text>
  <text x="800" y="86" text-anchor="middle" font-size="17" fill="#6B7280">Before and after a debris particle enters the orbiter's collider</text>

  <defs>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Divider line -->
  <line x1="800" y1="130" x2="800" y2="830" stroke="#6B7280" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- BEFORE label -->
  <text x="400" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#E5E7EB">Before</text>

  <!-- Orbiter before -->
  <circle cx="260" cy="440" r="58" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <text x="260" y="447" text-anchor="middle" font-size="16" font-weight="700" fill="#000">O</text>
  <text x="260" y="520" text-anchor="middle" font-size="14" fill="#F59E0B">mass m<tspan baseline-shift="sub" font-size="11">O</tspan></text>
  <!-- Orbiter velocity arrow -->
  <line x1="260" y1="440" x2="430" y2="380" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrO)"/>
  <text x="380" y="360" font-size="16" fill="#F59E0B" font-weight="700">v<tspan baseline-shift="sub" font-size="12">O</tspan></text>

  <!-- Debris before -->
  <circle cx="560" cy="520" r="20" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  <text x="560" y="526" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">D</text>
  <text x="560" y="568" text-anchor="middle" font-size="14" fill="#8B5CF6">mass m<tspan baseline-shift="sub" font-size="11">D</tspan></text>
  <!-- Debris velocity arrow -->
  <line x1="560" y1="520" x2="440" y2="570" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrD)"/>
  <text x="450" y="600" font-size="16" fill="#8B5CF6" font-weight="700">v<tspan baseline-shift="sub" font-size="12">D</tspan></text>

  <!-- Before formulas -->
  <rect x="80" y="660" width="640" height="160" rx="10" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <text x="100" y="695" font-size="16" fill="#E5E7EB" font-weight="700">State</text>
  <text x="100" y="728" font-size="15" fill="#E5E7EB">• Orbiter: mass m<tspan baseline-shift="sub" font-size="11">O</tspan>, velocity v<tspan baseline-shift="sub" font-size="11">O</tspan></text>
  <text x="100" y="755" font-size="15" fill="#E5E7EB">• Debris: mass m<tspan baseline-shift="sub" font-size="11">D</tspan>, velocity v<tspan baseline-shift="sub" font-size="11">D</tspan></text>
  <text x="100" y="785" font-size="14" fill="#6B7280">Debris is inside the orbiter's collider radius this tick.</text>

  <!-- AFTER label -->
  <text x="1200" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#E5E7EB">After</text>

  <!-- Combined body after: orbiter with slightly bigger radius, at the same position, new velocity between the two -->
  <circle cx="1060" cy="460" r="66" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <!-- Stuck debris visual riding the orbiter -->
  <circle cx="1090" cy="430" r="12" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  <circle cx="1030" cy="495" r="10" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  <text x="1060" y="467" text-anchor="middle" font-size="16" font-weight="700" fill="#000">O'</text>
  <text x="1060" y="550" text-anchor="middle" font-size="14" fill="#F59E0B">mass m<tspan baseline-shift="sub" font-size="11">O</tspan> + m<tspan baseline-shift="sub" font-size="11">D</tspan></text>

  <!-- Merged velocity arrow -->
  <line x1="1060" y1="460" x2="1220" y2="420" stroke="#10B981" stroke-width="5" marker-end="url(#arrM)"/>
  <text x="1180" y="395" font-size="18" font-weight="700" fill="#10B981">v'</text>

  <!-- After formulas -->
  <rect x="880" y="660" width="640" height="160" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
  <text x="900" y="695" font-size="16" fill="#10B981" font-weight="700">Conservation of momentum</text>
  <text x="900" y="735" font-size="22" font-weight="700" fill="#E5E7EB">v' = ( m<tspan baseline-shift="sub" font-size="13">O</tspan>·v<tspan baseline-shift="sub" font-size="13">O</tspan> + m<tspan baseline-shift="sub" font-size="13">D</tspan>·v<tspan baseline-shift="sub" font-size="13">D</tspan> )  /  ( m<tspan baseline-shift="sub" font-size="13">O</tspan> + m<tspan baseline-shift="sub" font-size="13">D</tspan> )</text>
  <text x="900" y="775" font-size="14" fill="#6B7280">Energy is NOT conserved — the difference becomes heat / deformation / game feel.</text>
  <text x="900" y="798" font-size="14" fill="#6B7280">Stuck debris visuals ride the orbiter transform with a random collider-local offset.</text>
</svg>
