<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="1600" height="600" fill="#0F172A"/>

  <text x="800" y="50" text-anchor="middle" fill="#E5E7EB" font-size="28" font-weight="700">Mobile save lifecycle</text>
  <text x="800" y="80" text-anchor="middle" fill="#6B7280" font-size="16">How wallet state survives a swipe-to-home, OS kill, and relaunch</text>

  <!-- Baseline -->
  <line x1="80" y1="300" x2="1520" y2="300" stroke="#6B7280" stroke-width="2"/>

  <!-- Time arrow -->
  <polygon points="1520,300 1500,292 1500,308" fill="#6B7280"/>
  <text x="1500" y="330" text-anchor="end" fill="#6B7280" font-size="14">wall-clock time →</text>

  <!-- Running bar 1 -->
  <rect x="100" y="280" width="280" height="40" rx="6" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <text x="240" y="306" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Running</text>
  <text x="240" y="260" text-anchor="middle" fill="#E5E7EB" font-size="13">player accumulates mass</text>

  <!-- Pause event marker -->
  <circle cx="400" cy="300" r="12" fill="#EF4444" stroke="#991B1B" stroke-width="2"/>
  <line x1="400" y1="288" x2="400" y2="180" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="400" y="170" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="700">OnApplicationPause(true)</text>
  <text x="400" y="152" text-anchor="middle" fill="#E5E7EB" font-size="12">swipe to home / phone call / OS interrupt</text>

  <!-- Save marker -->
  <circle cx="460" cy="300" r="12" fill="#10B981" stroke="#065F46" stroke-width="2"/>
  <line x1="460" y1="312" x2="460" y2="410" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="460" y="430" text-anchor="middle" fill="#10B981" font-size="14" font-weight="700">SaveService.Save</text>
  <text x="460" y="448" text-anchor="middle" fill="#E5E7EB" font-size="12">wallet → save.json on disk</text>

  <!-- Backgrounded / killed bar -->
  <rect x="485" y="280" width="400" height="40" rx="6" fill="#6B7280" stroke="#374151" stroke-width="2"/>
  <text x="685" y="306" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Backgrounded → killed</text>
  <text x="685" y="260" text-anchor="middle" fill="#E5E7EB" font-size="13">process suspended, then reclaimed by OS</text>

  <!-- Relaunch event -->
  <circle cx="905" cy="300" r="12" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <line x1="905" y1="288" x2="905" y2="180" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="905" y="170" text-anchor="middle" fill="#F59E0B" font-size="14" font-weight="700">Relaunch</text>
  <text x="905" y="152" text-anchor="middle" fill="#E5E7EB" font-size="12">player taps the app icon again</text>

  <!-- Load marker -->
  <circle cx="965" cy="300" r="12" fill="#10B981" stroke="#065F46" stroke-width="2"/>
  <line x1="965" y1="312" x2="965" y2="410" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="965" y="430" text-anchor="middle" fill="#10B981" font-size="14" font-weight="700">SaveService.Load</text>
  <text x="965" y="448" text-anchor="middle" fill="#E5E7EB" font-size="12">save.json → wallet in memory</text>

  <!-- Running bar 2 -->
  <rect x="990" y="280" width="520" height="40" rx="6" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <text x="1250" y="306" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Running (continued)</text>
  <text x="1250" y="260" text-anchor="middle" fill="#E5E7EB" font-size="13">balance preserved; progress feels seamless</text>

  <!-- Legend -->
  <g transform="translate(80, 500)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
    <text x="34" y="18" fill="#E5E7EB" font-size="14">app running</text>

    <rect x="160" y="0" width="24" height="24" rx="4" fill="#6B7280" stroke="#374151" stroke-width="2"/>
    <text x="194" y="18" fill="#E5E7EB" font-size="14">backgrounded / killed</text>

    <circle cx="392" cy="12" r="10" fill="#EF4444" stroke="#991B1B" stroke-width="2"/>
    <text x="410" y="18" fill="#E5E7EB" font-size="14">pause event</text>

    <circle cx="540" cy="12" r="10" fill="#10B981" stroke="#065F46" stroke-width="2"/>
    <text x="558" y="18" fill="#E5E7EB" font-size="14">disk write / read</text>
  </g>
</svg>
