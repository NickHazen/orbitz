<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="8" fill="#0F172A"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" fill="#E5E7EB" font-size="15" font-weight="bold">Perigee threshold bands</text>

  <!-- Outer safe zone (green ring) -->
  <circle cx="250" cy="270" r="190" fill="none" stroke="#10B981" stroke-width="40" opacity="0.2"/>
  <circle cx="250" cy="270" r="190" fill="none" stroke="#10B981" stroke-width="2"/>
  <circle cx="250" cy="270" r="170" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Middle decay zone (amber ring) -->
  <circle cx="250" cy="270" r="130" fill="none" stroke="#F59E0B" stroke-width="40" opacity="0.2"/>
  <circle cx="250" cy="270" r="150" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="250" cy="270" r="110" fill="none" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Inner surface zone (red) -->
  <circle cx="250" cy="270" r="70" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="2"/>

  <!-- Planet core (blue fill) -->
  <circle cx="250" cy="270" r="55" fill="#3B82F6" opacity="0.8" stroke="#1E40AF" stroke-width="2"/>
  <text x="250" y="275" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Planet</text>

  <!-- Labels -->
  <!-- Safe zone label (top-right) -->
  <line x1="370" y1="120" x2="400" y2="80" stroke="#10B981" stroke-width="1"/>
  <text x="405" y="72" fill="#10B981" font-size="12" font-weight="bold">Safe zone</text>
  <text x="405" y="88" fill="#6B7280" font-size="10">perigee > 1.05 x R_surface</text>
  <text x="405" y="102" fill="#6B7280" font-size="10">No drag. Orbits stable.</text>

  <!-- Decay zone label (right) -->
  <line x1="350" y1="200" x2="400" y2="170" stroke="#F59E0B" stroke-width="1"/>
  <text x="405" y="162" fill="#F59E0B" font-size="12" font-weight="bold">Decay zone</text>
  <text x="405" y="178" fill="#6B7280" font-size="10">0.9 - 1.05 x R_surface</text>
  <text x="405" y="192" fill="#6B7280" font-size="10">Drag circularizes, then shrinks.</text>

  <!-- Surface label (bottom-right) -->
  <line x1="300" y1="310" x2="400" y2="340" stroke="#EF4444" stroke-width="1"/>
  <text x="405" y="332" fill="#EF4444" font-size="12" font-weight="bold">Surface</text>
  <text x="405" y="348" fill="#6B7280" font-size="10">perigee &lt;= R_surface</text>
  <text x="405" y="362" fill="#6B7280" font-size="10">Particle absorbed.</text>

  <!-- Radius markers -->
  <!-- R_surface line -->
  <line x1="250" y1="270" x2="250" y2="200" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="258" y="215" fill="#6B7280" font-size="9">R_surface</text>

  <!-- 1.05 marker -->
  <text x="258" y="155" fill="#6B7280" font-size="9">1.05 R</text>
</svg>