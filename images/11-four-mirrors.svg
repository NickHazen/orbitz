<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="1600" height="900" fill="#0F172A"/>

  <!-- Title -->
  <text x="800" y="68" text-anchor="middle" fill="#E5E7EB" font-size="36" font-weight="700">Four mirrors of the physics-identity invariant</text>
  <text x="800" y="104" text-anchor="middle" fill="#6B7280" font-size="20">After guide 11 lands, four sites compute the same gravity formula. Change one, change all four.</text>

  <!-- Center circle with formula -->
  <g>
    <circle cx="800" cy="470" r="180" fill="#0F172A" stroke="#3B82F6" stroke-width="4"/>
    <circle cx="800" cy="470" r="170" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
    <text x="800" y="445" text-anchor="middle" fill="#E5E7EB" font-size="22" font-weight="700">Gravity identity</text>
    <text x="800" y="490" text-anchor="middle" fill="#E5E7EB" font-size="30" font-weight="700">a = G · M / (r² + ε²)</text>
    <text x="800" y="525" text-anchor="middle" fill="#6B7280" font-size="16">with softening radius ε clamping r</text>
  </g>

  <!-- Four boxes: TL, TR, BL, BR -->
  <!-- Top-left: GravityBody.FixedUpdate (orbiter orange — shipping) -->
  <g>
    <rect x="100" y="200" width="360" height="150" fill="#F59E0B" stroke="#B45309" stroke-width="3" rx="12"/>
    <text x="280" y="245" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700">GravityBody.FixedUpdate</text>
    <text x="280" y="278" text-anchor="middle" fill="#0F172A" font-size="16">live orbiter integrator</text>
    <text x="280" y="308" text-anchor="middle" fill="#7C2D12" font-size="14">ships today · guide 05</text>
    <text x="280" y="332" text-anchor="middle" fill="#7C2D12" font-size="14">calls planet.GetGravityAcceleration</text>
  </g>

  <!-- Top-right: SlingshotLauncher.UpdateTrajectoryPreview (orbiter orange — shipping) -->
  <g>
    <rect x="1140" y="200" width="360" height="150" fill="#F59E0B" stroke="#B45309" stroke-width="3" rx="12"/>
    <text x="1320" y="245" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700">SlingshotLauncher</text>
    <text x="1320" y="273" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700">.UpdateTrajectoryPreview</text>
    <text x="1320" y="308" text-anchor="middle" fill="#7C2D12" font-size="14">ships today · guide 06</text>
    <text x="1320" y="332" text-anchor="middle" fill="#7C2D12" font-size="14">re-runs the same Verlet step</text>
  </g>

  <!-- Bottom-left: DebrisField (plain C#) — legacy -->
  <g>
    <rect x="100" y="590" width="360" height="150" fill="#6B7280" stroke="#374151" stroke-width="3" rx="12" stroke-dasharray="8 6"/>
    <text x="280" y="635" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="700">DebrisField (plain C#)</text>
    <text x="280" y="668" text-anchor="middle" fill="#FFFFFF" font-size="16">per-particle for-loop</text>
    <text x="280" y="698" text-anchor="middle" fill="#D1D5DB" font-size="14">now legacy after the port · guide 07</text>
    <text x="280" y="722" text-anchor="middle" fill="#D1D5DB" font-size="14">still calls GetGravityAcceleration</text>
  </g>

  <!-- Bottom-right: VerletJob [BurstCompile] — new planet blue -->
  <g>
    <rect x="1140" y="590" width="360" height="150" fill="#3B82F6" stroke="#1E40AF" stroke-width="3" rx="12"/>
    <text x="1320" y="635" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="700">VerletJob</text>
    <text x="1320" y="665" text-anchor="middle" fill="#DBEAFE" font-size="18">[BurstCompile] · this guide</text>
    <text x="1320" y="698" text-anchor="middle" fill="#FFFFFF" font-size="14">new — inlines the formula</text>
    <text x="1320" y="722" text-anchor="middle" fill="#FFFFFF" font-size="14">Burst can't call managed methods</text>
  </g>

  <!-- Arrows from boxes to center -->
  <g stroke="#6B7280" stroke-width="3" fill="none">
    <!-- defs for arrowhead -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
      </marker>
    </defs>
    <!-- TL → center -->
    <line x1="460" y1="340" x2="655" y2="400" marker-end="url(#arrow)"/>
    <!-- TR → center -->
    <line x1="1140" y1="340" x2="945" y2="400" marker-end="url(#arrow)"/>
    <!-- BL → center -->
    <line x1="460" y1="600" x2="655" y2="540" marker-end="url(#arrow)"/>
    <!-- BR → center -->
    <line x1="1140" y1="600" x2="945" y2="540" marker-end="url(#arrow)"/>
  </g>

  <!-- Footer -->
  <text x="800" y="820" text-anchor="middle" fill="#E5E7EB" font-size="18">Grep test: searching for <tspan font-family="ui-monospace, Menlo, Consolas" fill="#F59E0B">iR * iR * iR</tspan> or <tspan font-family="ui-monospace, Menlo, Consolas" fill="#F59E0B">GetGravityAcceleration</tspan> should return four hits after the port.</text>
  <text x="800" y="852" text-anchor="middle" fill="#6B7280" font-size="16">Any one changes — all four change. Same commit. No exceptions.</text>
</svg>
