<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>
  <text x="800" y="54" text-anchor="middle" font-size="30" font-weight="700" fill="#E5E7EB">Soft cap — raw multiplier vs effective multiplier</text>
  <text x="800" y="86" text-anchor="middle" font-size="17" fill="#6B7280">Linear below the threshold, hyperbolic beyond — asymptotes at the ceiling</text>

  <!-- Plot: x 180..1480 → 0..20, px_per_unit = 65
       y 780..140 → 0..10, px_per_unit = 64 -->

  <!-- Axes -->
  <g stroke="#6B7280" stroke-width="1" fill="none">
    <line x1="180" y1="780" x2="1480" y2="780"/>
    <line x1="180" y1="140" x2="180" y2="780"/>
  </g>

  <!-- Horizontal grid lines at y = 2, 4, 5 (threshold), 6, 8, 10 (ceiling) -->
  <g stroke="#6B7280" stroke-width="0.5" opacity="0.4" stroke-dasharray="4 4">
    <line x1="180" y1="652" x2="1480" y2="652"/>
    <line x1="180" y1="524" x2="1480" y2="524"/>
    <line x1="180" y1="396" x2="1480" y2="396"/>
    <line x1="180" y1="268" x2="1480" y2="268"/>
  </g>

  <!-- Threshold line (x = 5 → px 505, and horizontal dashed at y = 5 → px 460) -->
  <line x1="505" y1="140" x2="505" y2="780" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.8"/>

  <!-- Ceiling asymptote at y = 10 → px 140 -->
  <line x1="180" y1="140" x2="1480" y2="140" stroke="#EF4444" stroke-width="2" stroke-dasharray="10 8" opacity="0.85"/>
  <text x="1470" y="132" text-anchor="end" font-size="14" font-weight="700" fill="#EF4444">ceiling = 10× (asymptote)</text>

  <!-- Shade the diminishing-returns region past raw = 10 -->
  <rect x="830" y="140" width="650" height="640" fill="#EF4444" fill-opacity="0.08"/>

  <!-- Soft-cap curve: linear 0..5 then hyperbolic approach to 10.
       Formula: SoftCap(x) = x if x<=5, else 5 + (10-5) * (x-5)/((x-5)+(10-5)) = 5 + 5*(x-5)/(x)
       For x in 5..20:
         x=5  → y=5
         x=6  → 5 + 5*(1/6)   = 5.833
         x=7  → 5 + 5*(2/7)   = 6.429
         x=8  → 5 + 5*(3/8)   = 6.875
         x=9  → 5 + 5*(4/9)   = 7.222
         x=10 → 5 + 5*(5/10)  = 7.500
         x=12 → 5 + 5*(7/12)  = 7.917
         x=14 → 5 + 5*(9/14)  = 8.214
         x=16 → 5 + 5*(11/16) = 8.438
         x=18 → 5 + 5*(13/18) = 8.611
         x=20 → 5 + 5*(15/20) = 8.750
       px coords: px_x = 180 + x*65, px_y = 780 - y*64 -->

  <polyline fill="none" stroke="#F59E0B" stroke-width="5"
    points="180,780
            245,716
            310,652
            375,588
            440,524
            505,460
            570,407
            635,369
            700,340
            765,317
            830,300
            895,286
            960,275
            1025,266
            1090,259
            1155,253
            1220,248
            1285,243
            1350,239
            1415,236
            1480,233"/>

  <!-- Knee dot at threshold (x = 5, y = 5) -->
  <circle cx="505" cy="460" r="9" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <text x="520" y="440" font-size="15" font-weight="700" fill="#F59E0B">knee at threshold</text>
  <text x="520" y="458" font-size="13" fill="#6B7280">raw = 5×, effective = 5×</text>

  <!-- Callout for diminishing region -->
  <rect x="900" y="540" width="540" height="110" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1.5"/>
  <text x="930" y="575" font-size="17" font-weight="700" fill="#EF4444">Diminishing returns past the threshold</text>
  <text x="930" y="602" font-size="14" fill="#E5E7EB">Each extra raw point adds less and less.</text>
  <text x="930" y="626" font-size="13" fill="#6B7280">Keeps no single upgrade owning the build.</text>

  <!-- X-axis ticks at 0, 5, 10, 15, 20 -->
  <g font-size="14" fill="#6B7280">
    <text x="180" y="810" text-anchor="middle">0</text>
    <text x="505" y="810" text-anchor="middle" fill="#F59E0B" font-weight="700">5 (threshold)</text>
    <text x="830" y="810" text-anchor="middle">10</text>
    <text x="1155" y="810" text-anchor="middle">15</text>
    <text x="1480" y="810" text-anchor="middle">20</text>
    <text x="830" y="855" text-anchor="middle" font-size="16" fill="#E5E7EB">Raw multiplier (raw stack from tier × base)</text>
  </g>

  <!-- Y-axis ticks at 0, 2, 4, 5, 6, 8, 10 -->
  <g font-size="14" fill="#6B7280">
    <text x="165" y="785" text-anchor="end">0</text>
    <text x="165" y="653" text-anchor="end">2</text>
    <text x="165" y="525" text-anchor="end">4</text>
    <text x="165" y="465" text-anchor="end" fill="#F59E0B" font-weight="700">5</text>
    <text x="165" y="397" text-anchor="end">6</text>
    <text x="165" y="269" text-anchor="end">8</text>
    <text x="165" y="145" text-anchor="end" fill="#EF4444" font-weight="700">10</text>
    <text x="60" y="460" text-anchor="middle" font-size="16" fill="#E5E7EB" transform="rotate(-90 60 460)">Effective multiplier</text>
  </g>

  <!-- Legend -->
  <rect x="230" y="210" width="360" height="150" rx="12" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <line x1="250" y1="245" x2="310" y2="245" stroke="#F59E0B" stroke-width="5"/>
  <text x="320" y="250" font-size="14" fill="#E5E7EB">Effective multiplier curve</text>
  <line x1="250" y1="280" x2="310" y2="280" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 6"/>
  <text x="320" y="285" font-size="14" fill="#E5E7EB">Threshold (linear below)</text>
  <line x1="250" y1="315" x2="310" y2="315" stroke="#EF4444" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="320" y="320" font-size="14" fill="#E5E7EB">Ceiling (never crossed)</text>
  <text x="250" y="348" font-size="12" fill="#6B7280">SoftCap(raw, 5, 10) — see implementation.</text>
</svg>
