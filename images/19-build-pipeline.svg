<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14">
  <style>
    .bg         { fill: #FDF8EB; }
    .panel      { fill: #EDDFBF; fill-opacity: 0.55; stroke: #C9AE7C; stroke-opacity: 0.7; }
    .txt        { fill: #2E1F14; }
    .txt-dim    { fill: #6B4A2E; }
    .arrow-line { stroke: #8B857A; fill: none; }
    .arrow-head { fill: #8B857A; }
    .running    { fill: #D9A860; stroke: #8B6918; }
    .running-t  { fill: #2E1F14; }
    .paused     { fill: #6B8098; stroke: #394A5E; }
    .paused-t   { fill: #FFFFFF; }
    .relaunch   { fill: #857F75; stroke: #4A443D; }
    .relaunch-t { fill: #FFFFFF; }
    .killed     { fill: #B45B4D; stroke: #6F3028; }
    .killed-t   { fill: #FFFFFF; }
    .decision   { fill: #EDDFBF; stroke: #C9AE7C; }

    @media (prefers-color-scheme: dark) {
      .bg         { fill: #1E293B; }
      .panel      { fill: #0F172A; fill-opacity: 0.55; stroke: #334155; stroke-opacity: 0.8; }
      .txt        { fill: #E5E4DC; }
      .txt-dim    { fill: #A3A097; }
      .arrow-line { stroke: #A3A097; }
      .arrow-head { fill: #A3A097; }
      .decision   { fill: #1A2033; stroke: #334155; }
    }
  </style>

  <rect class="bg" width="1600" height="900"/>

  <text class="txt" x="800" y="50" text-anchor="middle" font-size="28" font-weight="700">Build pipeline — one source tree, three platform stacks</text>
  <text class="txt-dim" x="800" y="80" text-anchor="middle" font-size="15">Unity compiles to IL2CPP once · each platform stack compiles that to its own native toolchain</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path class="arrow-head" d="M0,0 L10,5 L0,10 Z"/>
    </marker>
  </defs>

  <!-- SRC -->
  <rect class="relaunch" x="40" y="400" width="220" height="110" rx="12" stroke-width="2"/>
  <text class="relaunch-t" x="150" y="432" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 1 · SOURCE</text>
  <text class="relaunch-t" x="150" y="460" text-anchor="middle" font-size="16" font-weight="700">Unity source</text>
  <text class="relaunch-t" x="150" y="482" text-anchor="middle" font-size="12" font-style="italic">C# scripts · assets</text>
  <text class="relaunch-t" x="150" y="499" text-anchor="middle" font-size="12" font-style="italic">ProjectSettings/*</text>

  <line class="arrow-line" x1="261" y1="455" x2="299" y2="455" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IL2CPP -->
  <rect class="running" x="300" y="400" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="running-t" x="420" y="432" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 2 · TRANSPILE</text>
  <text class="running-t" x="420" y="460" text-anchor="middle" font-size="16" font-weight="700">IL2CPP</text>
  <text class="running-t" x="420" y="482" text-anchor="middle" font-size="12" font-style="italic">C# → C++ once</text>
  <text class="running-t" x="420" y="499" text-anchor="middle" font-size="12" font-style="italic">one shared intermediate</text>

  <!-- Fork arrows to 3 platform branches -->
  <line class="arrow-line" x1="542" y1="430" x2="679" y2="260" stroke-width="2" marker-end="url(#arrow)"/>
  <line class="arrow-line" x1="542" y1="455" x2="679" y2="455" stroke-width="2" marker-end="url(#arrow)"/>
  <line class="arrow-line" x1="542" y1="480" x2="679" y2="650" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- iOS path: XC -> IPA -->
  <rect class="paused" x="680" y="215" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="paused-t" x="800" y="247" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 3 · iOS</text>
  <text class="paused-t" x="800" y="275" text-anchor="middle" font-size="16" font-weight="700">Xcode</text>
  <text class="paused-t" x="800" y="297" text-anchor="middle" font-size="12" font-style="italic">Clang + Metal</text>
  <text class="paused-t" x="800" y="314" text-anchor="middle" font-size="12" font-style="italic">code-sign with dev cert</text>

  <line class="arrow-line" x1="921" y1="270" x2="959" y2="270" stroke-width="2" marker-end="url(#arrow)"/>

  <rect class="paused" x="960" y="215" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="paused-t" x="1080" y="247" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 4 · iOS OUTPUT</text>
  <text class="paused-t" x="1080" y="275" text-anchor="middle" font-size="16" font-weight="700">Signed .ipa</text>
  <text class="paused-t" x="1080" y="297" text-anchor="middle" font-size="12" font-style="italic">App Store Connect upload</text>
  <text class="paused-t" x="1080" y="314" text-anchor="middle" font-size="12" font-style="italic">TestFlight / review</text>

  <!-- Android path: GR -> AAB -->
  <rect class="running" x="680" y="400" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="running-t" x="800" y="432" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 3 · ANDROID</text>
  <text class="running-t" x="800" y="460" text-anchor="middle" font-size="16" font-weight="700">Gradle</text>
  <text class="running-t" x="800" y="482" text-anchor="middle" font-size="12" font-style="italic">NDK + Vulkan</text>
  <text class="running-t" x="800" y="499" text-anchor="middle" font-size="12" font-style="italic">keystore-sign</text>

  <line class="arrow-line" x1="921" y1="455" x2="959" y2="455" stroke-width="2" marker-end="url(#arrow)"/>

  <rect class="running" x="960" y="400" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="running-t" x="1080" y="432" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 4 · ANDROID OUTPUT</text>
  <text class="running-t" x="1080" y="460" text-anchor="middle" font-size="16" font-weight="700">Signed .aab</text>
  <text class="running-t" x="1080" y="482" text-anchor="middle" font-size="12" font-style="italic">Play Console upload</text>
  <text class="running-t" x="1080" y="499" text-anchor="middle" font-size="12" font-style="italic">internal track rollout</text>

  <!-- Web path: WG -> WEB -->
  <rect class="killed" x="680" y="585" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="killed-t" x="800" y="617" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 3 · WEB</text>
  <text class="killed-t" x="800" y="645" text-anchor="middle" font-size="16" font-weight="700">Emscripten</text>
  <text class="killed-t" x="800" y="667" text-anchor="middle" font-size="12" font-style="italic">LLVM → WASM</text>
  <text class="killed-t" x="800" y="684" text-anchor="middle" font-size="12" font-style="italic">WebGL/WebGPU glue</text>

  <line class="arrow-line" x1="921" y1="640" x2="959" y2="640" stroke-width="2" marker-end="url(#arrow)"/>

  <rect class="killed" x="960" y="585" width="240" height="110" rx="12" stroke-width="2"/>
  <text class="killed-t" x="1080" y="617" text-anchor="middle" font-size="11" font-style="italic" letter-spacing="0.1em">STAGE 4 · WEB OUTPUT</text>
  <text class="killed-t" x="1080" y="645" text-anchor="middle" font-size="16" font-weight="700">Hosted bundle</text>
  <text class="killed-t" x="1080" y="667" text-anchor="middle" font-size="12" font-style="italic">.wasm + .js + .data</text>
  <text class="killed-t" x="1080" y="684" text-anchor="middle" font-size="12" font-style="italic">upload to CDN / itch.io</text>

  <!-- Side panel: take-aways -->
  <rect class="panel" x="1240" y="215" width="320" height="480" rx="12" stroke-width="1"/>
  <text class="txt"     x="1400" y="255" text-anchor="middle" font-size="15" font-weight="700">One source, three targets</text>
  <text class="txt"     x="1400" y="288" text-anchor="middle" font-size="13">IL2CPP is the fork point —</text>
  <text class="txt"     x="1400" y="307" text-anchor="middle" font-size="13">same C# → same C++ → three</text>
  <text class="txt"     x="1400" y="326" text-anchor="middle" font-size="13">native back-ends downstream.</text>
  <text class="txt-dim" x="1400" y="365" text-anchor="middle" font-size="12" font-style="italic">Platform differences live</text>
  <text class="txt-dim" x="1400" y="383" text-anchor="middle" font-size="12" font-style="italic">in the toolchain, not your code.</text>
  <text class="txt"     x="1400" y="425" text-anchor="middle" font-size="13" font-weight="700">Build-time costs (approx):</text>
  <text class="txt-dim" x="1400" y="451" text-anchor="middle" font-size="12" font-style="italic">IL2CPP transpile: 1–3 min</text>
  <text class="txt-dim" x="1400" y="469" text-anchor="middle" font-size="12" font-style="italic">Xcode link: 2–6 min</text>
  <text class="txt-dim" x="1400" y="487" text-anchor="middle" font-size="12" font-style="italic">Gradle assemble: 1–3 min</text>
  <text class="txt-dim" x="1400" y="505" text-anchor="middle" font-size="12" font-style="italic">Emscripten link: 3–8 min</text>
  <text class="txt"     x="1400" y="550" text-anchor="middle" font-size="13" font-weight="700">CI tip</text>
  <text class="txt-dim" x="1400" y="574" text-anchor="middle" font-size="12" font-style="italic">Run IL2CPP once per commit,</text>
  <text class="txt-dim" x="1400" y="592" text-anchor="middle" font-size="12" font-style="italic">fan out to three parallel jobs</text>
  <text class="txt-dim" x="1400" y="610" text-anchor="middle" font-size="12" font-style="italic">for the native toolchains.</text>
  <text class="txt-dim" x="1400" y="650" text-anchor="middle" font-size="11" font-style="italic">Don't run three IL2CPP passes —</text>
  <text class="txt-dim" x="1400" y="668" text-anchor="middle" font-size="11" font-style="italic">cache the C++ artifact.</text>

  <!-- Footer -->
  <text class="txt-dim" x="800" y="852" text-anchor="middle" font-size="13" font-style="italic">Switching platforms in the Unity Editor invalidates the IL2CPP cache on each flip — configure a dedicated CI runner per target if build time matters.</text>
</svg>
