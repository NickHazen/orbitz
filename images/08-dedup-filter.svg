<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" rx="8" fill="#0F172A"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#E5E7EB" font-size="15" font-weight="bold">The j > i dedup rule</text>

  <!-- Left panel: particle i's 3x3 neighborhood -->
  <text x="175" y="58" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="bold">Particle i scans its 3x3</text>

  <!-- Grid cells (left) -->
  <g transform="translate(55, 70)">
    <!-- 5x4 grid area, highlight 3x3 around i -->
    <!-- Background cells -->
    <rect x="0" y="0" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="60" y="0" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="120" y="0" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="180" y="0" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>

    <rect x="0" y="60" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <!-- i's 3x3 neighborhood highlighted -->
    <rect x="60" y="60" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="120" y="60" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="180" y="60" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>

    <rect x="0" y="120" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <!-- i is in this row -->
    <rect x="60" y="120" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="120" y="120" width="60" height="60" fill="#F59E0B" opacity="0.25" stroke="#F59E0B" stroke-width="2"/>
    <rect x="180" y="120" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>

    <rect x="0" y="180" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="60" y="180" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="120" y="180" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="180" y="180" width="60" height="60" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>

    <!-- Particle i -->
    <circle cx="150" cy="150" r="8" fill="#F59E0B"/>
    <text x="150" y="154" text-anchor="middle" fill="#0F172A" font-size="11" font-weight="bold">i</text>

    <!-- Particle j in i's neighborhood -->
    <circle cx="210" cy="90" r="8" fill="#8B5CF6"/>
    <text x="210" y="94" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">j</text>

    <!-- Shared cell highlight -->
    <rect x="180" y="60" width="60" height="60" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3"/>
  </g>

  <!-- Right panel: particle j's 3x3 neighborhood -->
  <text x="525" y="58" text-anchor="middle" fill="#8B5CF6" font-size="13" font-weight="bold">Particle j scans its 3x3</text>

  <!-- Grid cells (right) -->
  <g transform="translate(405, 70)">
    <rect x="0" y="0" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="60" y="0" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="120" y="0" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="180" y="0" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>

    <rect x="0" y="60" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="60" y="60" width="60" height="60" fill="#8B5CF6" opacity="0.25" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="120" y="60" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="180" y="60" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>

    <rect x="0" y="120" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="60" y="120" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="120" y="120" width="60" height="60" fill="#8B5CF6" opacity="0.12" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="180" y="120" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>

    <rect x="0" y="180" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="60" y="180" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="120" y="180" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>
    <rect x="180" y="180" width="60" height="60" fill="#1E293B" stroke="#374151" stroke-width="1"/>

    <!-- Particle j -->
    <circle cx="90" cy="90" r="8" fill="#8B5CF6"/>
    <text x="90" y="94" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">j</text>

    <!-- Particle i in j's neighborhood -->
    <circle cx="30" cy="150" r="8" fill="#F59E0B"/>
    <text x="30" y="154" text-anchor="middle" fill="#0F172A" font-size="11" font-weight="bold">i</text>

    <!-- Shared cell highlight -->
    <rect x="0" y="60" width="60" height="60" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3"/>
  </g>

  <!-- Arrow between panels -->
  <text x="350" y="180" text-anchor="middle" fill="#6B7280" font-size="28">+</text>
  <text x="350" y="205" text-anchor="middle" fill="#6B7280" font-size="11">Same pair,</text>
  <text x="350" y="219" text-anchor="middle" fill="#6B7280" font-size="11">found twice</text>

  <!-- Legend for shared cell -->
  <rect x="295" y="130" width="14" height="14" fill="#10B981" opacity="0.3" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="314" y="142" fill="#10B981" font-size="10">Shared cell</text>

  <!-- Solution bar at bottom -->
  <rect x="50" y="316" width="600" height="48" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="350" y="338" text-anchor="middle" fill="#10B981" font-size="14" font-weight="bold">Fix: process pair only when j > i</text>
  <text x="350" y="356" text-anchor="middle" fill="#6B7280" font-size="12">Halves collision work. Prevents energy injection from double-impulse.</text>
</svg>