<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>
  <text x="800" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#E5E7EB">Scene view with debug gizmos enabled</text>
  <text x="800" y="72" text-anchor="middle" font-size="16" fill="#6B7280">Every invisible thing made visible — rings, arrows, grids, dots</text>

  <!-- Spatial-hash grid overlay (drawn first, faint, behind everything) -->
  <g stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3 5" opacity="0.40">
    <!-- vertical lines every 80 px from x=120 to x=1480 -->
    <line x1="120"  y1="120" x2="120"  y2="820"/>
    <line x1="200"  y1="120" x2="200"  y2="820"/>
    <line x1="280"  y1="120" x2="280"  y2="820"/>
    <line x1="360"  y1="120" x2="360"  y2="820"/>
    <line x1="440"  y1="120" x2="440"  y2="820"/>
    <line x1="520"  y1="120" x2="520"  y2="820"/>
    <line x1="600"  y1="120" x2="600"  y2="820"/>
    <line x1="680"  y1="120" x2="680"  y2="820"/>
    <line x1="760"  y1="120" x2="760"  y2="820"/>
    <line x1="840"  y1="120" x2="840"  y2="820"/>
    <line x1="920"  y1="120" x2="920"  y2="820"/>
    <line x1="1000" y1="120" x2="1000" y2="820"/>
    <line x1="1080" y1="120" x2="1080" y2="820"/>
    <line x1="1160" y1="120" x2="1160" y2="820"/>
    <line x1="1240" y1="120" x2="1240" y2="820"/>
    <line x1="1320" y1="120" x2="1320" y2="820"/>
    <line x1="1400" y1="120" x2="1400" y2="820"/>
    <line x1="1480" y1="120" x2="1480" y2="820"/>
    <!-- horizontal lines every 80 px -->
    <line x1="120" y1="120" x2="1480" y2="120"/>
    <line x1="120" y1="200" x2="1480" y2="200"/>
    <line x1="120" y1="280" x2="1480" y2="280"/>
    <line x1="120" y1="360" x2="1480" y2="360"/>
    <line x1="120" y1="440" x2="1480" y2="440"/>
    <line x1="120" y1="520" x2="1480" y2="520"/>
    <line x1="120" y1="600" x2="1480" y2="600"/>
    <line x1="120" y1="680" x2="1480" y2="680"/>
    <line x1="120" y1="760" x2="1480" y2="760"/>
    <line x1="120" y1="820" x2="1480" y2="820"/>
  </g>
  <text x="160" y="810" font-size="12" fill="#8B5CF6" opacity="0.85">spatial-hash cell</text>

  <!-- Softening radius (red dashed, innermost boundary) -->
  <circle cx="640" cy="470" r="150" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="10 8" opacity="0.85"/>
  <!-- Atmosphere ring (red solid, outer boundary) -->
  <circle cx="640" cy="470" r="230" fill="none" stroke="#EF4444" stroke-width="2.5" opacity="0.95"/>

  <!-- Planet (blue fill) -->
  <circle cx="640" cy="470" r="120" fill="#3B82F6" stroke="#1E40AF" stroke-width="3"/>
  <text x="640" y="476" text-anchor="middle" font-size="14" font-weight="700" fill="#E5E7EB">Planetoid</text>

  <!-- Ring labels (lead lines to the right, into free space now that orbiter lives on the left) -->
  <line x1="805" y1="345" x2="1010" y2="210" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
  <text x="1018" y="208" font-size="14" fill="#EF4444">atmosphere ring (red)</text>
  <line x1="755" y1="390" x2="1010" y2="260" stroke="#EF4444" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
  <text x="1018" y="258" font-size="14" fill="#EF4444">softening radius (red dashed)</text>

  <!-- Orbiter (orange dot, above-left of planet so it doesn't crowd the ring labels) -->
  <defs>
    <marker id="arrow-orange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-neutral" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6B7280"/>
    </marker>
  </defs>
  <circle cx="270" cy="310" r="14" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <text x="200" y="296" font-size="14" font-weight="700" fill="#F59E0B">Orbiter</text>

  <!-- Velocity arrow from orbiter, tangent-ish (points up-left into empty sky) -->
  <line x1="270" y1="310" x2="130" y2="240" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow-orange)"/>
  <text x="130" y="218" font-size="14" fill="#F59E0B">velocity</text>

  <!-- Pull-distance circle around orbiter (showing max pull radius — typical of launcher gizmo) -->
  <circle cx="270" cy="310" r="90" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.75"/>
  <text x="195" y="415" font-size="12" fill="#F59E0B" opacity="0.9">pull-distance circle</text>

  <!-- Debris particles (purple dots) scattered within atmosphere ring-ish -->
  <g fill="#8B5CF6" stroke="#5B21B6" stroke-width="1">
    <circle cx="430" cy="530" r="5"/>
    <circle cx="478" cy="625" r="5"/>
    <circle cx="560" cy="680" r="5"/>
    <circle cx="720" cy="685" r="5"/>
    <circle cx="820" cy="615" r="5"/>
    <circle cx="870" cy="510" r="5"/>
    <circle cx="860" cy="405" r="5"/>
    <circle cx="795" cy="330" r="5"/>
    <circle cx="610" cy="235" r="5"/>
    <circle cx="500" cy="300" r="5"/>
    <circle cx="405" cy="410" r="5"/>
    <circle cx="290" cy="490" r="4"/>
    <circle cx="300" cy="640" r="4"/>
    <circle cx="950" cy="680" r="4"/>
    <circle cx="1020" cy="545" r="4"/>
    <circle cx="1120" cy="420" r="4"/>
  </g>
  <!-- label one debris -->
  <line x1="870" y1="510" x2="980" y2="570" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
  <text x="985" y="575" font-size="13" fill="#8B5CF6">debris particle</text>

  <!-- Legend (bottom-right block) -->
  <rect x="1150" y="585" width="420" height="240" rx="12" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <text x="1170" y="615" font-size="15" font-weight="700" fill="#E5E7EB">Legend</text>

  <circle cx="1185" cy="645" r="10" fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
  <text x="1205" y="650" font-size="13" fill="#E5E7EB">Planetoid (blue fill)</text>

  <line x1="1170" y1="678" x2="1210" y2="678" stroke="#EF4444" stroke-width="2.5"/>
  <text x="1220" y="683" font-size="13" fill="#E5E7EB">Atmosphere ring (solid red)</text>

  <line x1="1170" y1="706" x2="1210" y2="706" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="1220" y="711" font-size="13" fill="#E5E7EB">Softening radius (dashed red)</text>

  <circle cx="1185" cy="735" r="8" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <line x1="1168" y1="735" x2="1204" y2="735" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="1220" y="740" font-size="13" fill="#E5E7EB">Orbiter + velocity arrow</text>

  <line x1="1170" y1="762" x2="1210" y2="762" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6 6"/>
  <text x="1220" y="767" font-size="13" fill="#E5E7EB">Pull-distance circle (orange)</text>

  <g>
    <line x1="1170" y1="790" x2="1210" y2="790" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3 5"/>
  </g>
  <text x="1220" y="795" font-size="13" fill="#E5E7EB">Spatial-hash cells (purple)</text>

  <circle cx="1185" cy="815" r="5" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
  <text x="1220" y="820" font-size="13" fill="#E5E7EB">Debris particle (purple dot)</text>

  <!-- Framing label top-left -->
  <rect x="80" y="90" width="220" height="36" rx="8" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <text x="95" y="114" font-size="14" fill="#E5E7EB">Scene view · Gizmos enabled</text>
</svg>
