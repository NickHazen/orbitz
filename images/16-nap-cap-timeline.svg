<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>
  <text x="800" y="54" text-anchor="middle" font-size="30" font-weight="700" fill="#E5E7EB">The nap cap — credited offline time vs wall time away</text>
  <text x="800" y="86" text-anchor="middle" font-size="17" fill="#6B7280">Earn 1:1 up to the cap, then the plateau holds — no matter how long you sleep</text>

  <!-- Plot area: x 180..1480 (width 1300), y 140..780 (height 640) -->
  <!-- Axes -->
  <g stroke="#6B7280" stroke-width="1" fill="none">
    <line x1="180" y1="780" x2="1480" y2="780"/>
    <line x1="180" y1="140" x2="180" y2="780"/>
  </g>

  <!-- Grid lines (horizontal, at 2h, 4h, 6h, 8h) -->
  <g stroke="#6B7280" stroke-width="0.5" opacity="0.45" stroke-dasharray="4 4">
    <line x1="180" y1="620" x2="1480" y2="620"/>
    <line x1="180" y1="460" x2="1480" y2="460"/>
    <line x1="180" y1="300" x2="1480" y2="300"/>
    <line x1="180" y1="140" x2="1480" y2="140"/>
  </g>

  <!-- Plot math:
       X: 0..24 hours → 180..1480, so px_per_hr = (1480-180)/24 ≈ 54.17
       Y: 0..8 hours  → 780..140, so px_per_credit_hr = (780-140)/8 = 80
       Cap at 8 wall-hours maps to x = 180 + 8*54.17 = 613.33 -->

  <!-- Shaded plateau region (past the cap, cap still 8h credited) -->
  <rect x="613" y="140" width="867" height="640" fill="#EF4444" fill-opacity="0.10"/>

  <!-- Diagonal y = x up to cap, then horizontal plateau -->
  <!-- Diagonal segment: (180, 780) → (613, 140) -->
  <polyline fill="none" stroke="#F59E0B" stroke-width="5"
    points="180,780 613,140 1480,140"/>

  <!-- Red dashed horizontal at cap threshold (y = 8h → y-pixel 140) -->
  <line x1="180" y1="140" x2="1480" y2="140" stroke="#EF4444" stroke-width="2" stroke-dasharray="10 8" opacity="0.85"/>

  <!-- Red dashed vertical at the cap threshold on the x-axis (8h) -->
  <line x1="613" y1="140" x2="613" y2="780" stroke="#EF4444" stroke-width="2" stroke-dasharray="10 8" opacity="0.75"/>

  <!-- Knee dot -->
  <circle cx="613" cy="140" r="8" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
  <text x="625" y="128" font-size="15" font-weight="700" fill="#F59E0B">knee at cap</text>
  <text x="625" y="148" font-size="13" fill="#6B7280">wall = 8 h, credit = 8 h</text>

  <!-- Annotation over the plateau region -->
  <rect x="830" y="230" width="560" height="120" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1.5"/>
  <text x="860" y="265" font-size="17" font-weight="700" fill="#EF4444">Nap cap: offline progress tops out here</text>
  <text x="860" y="292" font-size="14" fill="#E5E7EB">A 24-hour absence still credits 8 hours.</text>
  <text x="860" y="316" font-size="14" fill="#E5E7EB">Bounds catch-up math and blocks clock-set exploits.</text>
  <text x="860" y="340" font-size="13" fill="#6B7280">Tune the cap for your session cadence — 8 h is a nap, not a verdict.</text>

  <!-- X-axis ticks at 0, 4, 8, 12, 16, 20, 24 -->
  <g font-size="14" fill="#6B7280">
    <text x="180" y="810" text-anchor="middle">0</text>
    <text x="397" y="810" text-anchor="middle">4</text>
    <text x="613" y="810" text-anchor="middle" fill="#EF4444" font-weight="700">8 (cap)</text>
    <text x="830" y="810" text-anchor="middle">12</text>
    <text x="1047" y="810" text-anchor="middle">16</text>
    <text x="1263" y="810" text-anchor="middle">20</text>
    <text x="1480" y="810" text-anchor="middle">24</text>
    <text x="830" y="855" text-anchor="middle" font-size="16" fill="#E5E7EB">Wall time away (hours)</text>
  </g>

  <!-- Y-axis ticks at 0, 2, 4, 6, 8 -->
  <g font-size="14" fill="#6B7280">
    <text x="165" y="785" text-anchor="end">0</text>
    <text x="165" y="625" text-anchor="end">2</text>
    <text x="165" y="465" text-anchor="end">4</text>
    <text x="165" y="305" text-anchor="end">6</text>
    <text x="165" y="145" text-anchor="end" fill="#EF4444" font-weight="700">8</text>
    <text x="60" y="460" text-anchor="middle" font-size="16" fill="#E5E7EB" transform="rotate(-90 60 460)">Credited offline time (hours)</text>
  </g>

  <!-- Legend -->
  <rect x="230" y="520" width="360" height="150" rx="12" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <line x1="250" y1="555" x2="310" y2="555" stroke="#F59E0B" stroke-width="5"/>
  <text x="320" y="560" font-size="14" fill="#E5E7EB">Credited offline time</text>
  <line x1="250" y1="590" x2="310" y2="590" stroke="#EF4444" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="320" y="595" font-size="14" fill="#E5E7EB">Cap threshold</text>
  <rect x="250" y="618" width="60" height="14" fill="#EF4444" fill-opacity="0.18" stroke="#EF4444" stroke-width="1"/>
  <text x="320" y="630" font-size="14" fill="#E5E7EB">Plateau region (no further credit)</text>
  <text x="250" y="658" font-size="12" fill="#6B7280">y = min(x, cap) — a one-line safety rail.</text>
</svg>
