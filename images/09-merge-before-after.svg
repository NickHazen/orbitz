<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
    <marker id="arr-orb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arr-deb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8B5CF6"/>
    </marker>
    <marker id="arr-merged" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="8" fill="#0F172A"/>

  <!-- BEFORE section -->
  <text x="160" y="30" text-anchor="middle" fill="#E5E7EB" font-size="15" font-weight="bold">Before</text>

  <!-- Orbiter (orange, larger) -->
  <circle cx="120" cy="150" r="28" fill="#F59E0B" opacity="0.3" stroke="#F59E0B" stroke-width="2"/>
  <text x="120" y="145" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="bold">m_1</text>
  <text x="120" y="162" text-anchor="middle" fill="#E5E7EB" font-size="10">= 1.0</text>
  <!-- velocity arrow v1 -->
  <line x1="148" y1="150" x2="210" y2="150" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr-orb)"/>
  <text x="180" y="140" text-anchor="middle" fill="#F59E0B" font-size="11">v_1 = (1, 0)</text>

  <!-- Debris particle (purple, smaller) -->
  <circle cx="200" cy="230" r="16" fill="#8B5CF6" opacity="0.3" stroke="#8B5CF6" stroke-width="2"/>
  <text x="200" y="226" text-anchor="middle" fill="#8B5CF6" font-size="11" font-weight="bold">m_2</text>
  <text x="200" y="242" text-anchor="middle" fill="#E5E7EB" font-size="10">= 0.2</text>
  <!-- velocity arrow v2 -->
  <line x1="200" y1="214" x2="200" y2="182" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arr-deb)"/>
  <text x="222" y="198" fill="#8B5CF6" font-size="11">v_2 = (0, 1)</text>

  <!-- Big arrow: absorb -->
  <line x1="310" y1="170" x2="410" y2="170" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <text x="360" y="158" text-anchor="middle" fill="#6B7280" font-size="12" font-weight="bold">Absorb</text>
  <text x="360" y="198" text-anchor="middle" fill="#6B7280" font-size="10">(perfectly inelastic)</text>

  <!-- AFTER section -->
  <text x="570" y="30" text-anchor="middle" fill="#E5E7EB" font-size="15" font-weight="bold">After</text>

  <!-- Merged particle (blended, larger than orbiter) -->
  <circle cx="540" cy="170" r="34" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="2"/>
  <!-- Inner gradient hint: orange and purple halves -->
  <circle cx="540" cy="170" r="34" fill="none" stroke="#F59E0B" stroke-width="1" stroke-dasharray="53,54" opacity="0.5"/>
  <circle cx="540" cy="170" r="34" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="0,53,54,0" opacity="0.5"/>

  <text x="540" y="162" text-anchor="middle" fill="#10B981" font-size="12" font-weight="bold">m_1 + m_2</text>
  <text x="540" y="180" text-anchor="middle" fill="#E5E7EB" font-size="10">= 1.2</text>

  <!-- Merged velocity arrow -->
  <line x1="574" y1="170" x2="660" y2="148" stroke="#10B981" stroke-width="2.5" marker-end="url(#arr-merged)"/>
  <text x="645" y="138" fill="#10B981" font-size="11">v_f = (0.83, 0.17)</text>

  <!-- Formula box at bottom -->
  <rect x="120" y="270" width="560" height="36" rx="5" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <text x="400" y="294" text-anchor="middle" fill="#E5E7EB" font-size="13" font-family="monospace">v_f = (m_1 * v_1 + m_2 * v_2) / (m_1 + m_2)</text>
</svg>