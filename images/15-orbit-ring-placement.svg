<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="1000" height="1000" fill="#0F172A"/>

  <!-- Title -->
  <text x="500" y="46" text-anchor="middle" fill="#E5E7EB" font-size="26" font-weight="700">Stations on three orbit rings</text>
  <text x="500" y="74" text-anchor="middle" fill="#6B7280" font-size="14">Higher tier costs more, sits farther out, and yields more mass per second.</text>

  <!-- Planet -->
  <circle cx="500" cy="500" r="70" fill="#3B82F6" stroke="#1E40AF" stroke-width="3"/>
  <text x="500" y="506" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Planet</text>

  <!-- Atmosphere ring (subtle red hint) -->
  <circle cx="500" cy="500" r="100" fill="none" stroke="#EF4444" stroke-width="1" stroke-dasharray="2 6" opacity="0.6"/>
  <text x="560" y="412" fill="#EF4444" font-size="11" opacity="0.8">atmosphere</text>

  <!-- Ring 1 (inner, Tier 1) -->
  <circle cx="500" cy="500" r="170" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="8 6"/>
  <!-- Ring 2 (middle, Tier 2) -->
  <circle cx="500" cy="500" r="290" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="8 6"/>
  <!-- Ring 3 (outer, Tier 3) -->
  <circle cx="500" cy="500" r="410" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="8 6"/>

  <!-- Tier 1: Harvesters (inner ring) -->
  <g transform="translate(670, 500)">
    <rect x="-10" y="-10" width="20" height="20" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  </g>
  <g transform="translate(390, 360)">
    <rect x="-10" y="-10" width="20" height="20" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  </g>

  <!-- Tier 1 label -->
  <g transform="translate(700, 560)">
    <rect x="0" y="0" width="260" height="74" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
    <text x="14" y="24" fill="#8B5CF6" font-size="15" font-weight="700">Tier 1 · Harvester</text>
    <text x="14" y="44" fill="#E5E7EB" font-size="12">close orbit, cheap to build</text>
    <text x="14" y="64" fill="#10B981" font-size="13" font-weight="700">+2 mass/s</text>
  </g>

  <!-- Tier 2: Refineries (middle ring) -->
  <g transform="translate(500, 210)">
    <rect x="-12" y="-12" width="24" height="24" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  </g>
  <g transform="translate(500, 790)">
    <rect x="-12" y="-12" width="24" height="24" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  </g>

  <!-- Tier 2 label -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="270" height="74" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
    <text x="14" y="24" fill="#8B5CF6" font-size="15" font-weight="700">Tier 2 · Refinery</text>
    <text x="14" y="44" fill="#E5E7EB" font-size="12">stable mid-orbit, higher income</text>
    <text x="14" y="64" fill="#10B981" font-size="13" font-weight="700">+12 mass/s</text>
  </g>

  <!-- Tier 3: Compounders (outer ring) -->
  <g transform="translate(910, 500)">
    <rect x="-14" y="-14" width="28" height="28" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
  </g>

  <!-- Tier 3 label -->
  <g transform="translate(680, 100)">
    <rect x="0" y="0" width="280" height="74" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
    <text x="14" y="24" fill="#8B5CF6" font-size="15" font-weight="700">Tier 3 · Compounder</text>
    <text x="14" y="44" fill="#E5E7EB" font-size="12">far orbit, expensive unlock</text>
    <text x="14" y="64" fill="#10B981" font-size="13" font-weight="700">+75 mass/s</text>
  </g>

  <!-- Radius labels along a spoke -->
  <text x="506" y="430" fill="#6B7280" font-size="11">r₁</text>
  <text x="506" y="790" fill="#6B7280" font-size="11">r₂</text>
  <text x="506" y="910" fill="#6B7280" font-size="11">r₃</text>

  <!-- Legend -->
  <g transform="translate(40, 930)">
    <circle cx="10" cy="10" r="7" fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
    <text x="26" y="15" fill="#E5E7EB" font-size="13">planet</text>

    <rect x="110" y="3" width="14" height="14" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
    <text x="132" y="15" fill="#E5E7EB" font-size="13">station</text>

    <line x1="220" y1="10" x2="270" y2="10" stroke="#6B7280" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="280" y="15" fill="#E5E7EB" font-size="13">orbit ring</text>

    <line x1="410" y1="10" x2="460" y2="10" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.8"/>
    <text x="470" y="15" fill="#E5E7EB" font-size="13">atmosphere</text>

    <text x="620" y="15" fill="#10B981" font-size="13">green numbers · passive mass/s</text>
  </g>
</svg>
