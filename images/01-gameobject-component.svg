<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>

  <!-- Title -->
  <text x="800" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#E5E7EB">Anatomy of the Orbiter prefab</text>
  <text x="800" y="92" text-anchor="middle" font-size="18" fill="#6B7280">One GameObject stacking five components — only one of them is ours</text>

  <!-- Outer container: GameObject -->
  <rect x="360" y="130" width="880" height="680" rx="16" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="400" y="165" font-size="18" font-weight="700" fill="#6B7280">Orbiter GameObject</text>
  <text x="400" y="188" font-size="14" fill="#6B7280">Instantiated by SlingshotLauncher from Orbiter.prefab</text>

  <!-- Component 1: Transform -->
  <rect x="420" y="220" width="760" height="90" rx="10" fill="#6B7280" stroke="#374151" stroke-width="2"/>
  <text x="800" y="255" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Transform</text>
  <text x="800" y="285" text-anchor="middle" font-size="15" fill="#E5E7EB">Position, rotation, scale. Every GameObject has exactly one, always.</text>

  <!-- Component 2: SpriteRenderer -->
  <rect x="420" y="325" width="760" height="90" rx="10" fill="#6B7280" stroke="#374151" stroke-width="2"/>
  <text x="800" y="360" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">SpriteRenderer</text>
  <text x="800" y="390" text-anchor="middle" font-size="15" fill="#E5E7EB">Draws the orbiter sprite on screen. Stock Unity component, no custom code.</text>

  <!-- Component 3: CircleCollider2D -->
  <rect x="420" y="430" width="760" height="90" rx="10" fill="#6B7280" stroke="#374151" stroke-width="2"/>
  <text x="800" y="465" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">CircleCollider2D</text>
  <text x="800" y="495" text-anchor="middle" font-size="15" fill="#E5E7EB">isTrigger = true. Physical footprint used only for OnTriggerEnter2D callbacks.</text>

  <!-- Component 4: Rigidbody2D -->
  <rect x="420" y="535" width="760" height="90" rx="10" fill="#6B7280" stroke="#374151" stroke-width="2"/>
  <text x="800" y="570" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Rigidbody2D</text>
  <text x="800" y="600" text-anchor="middle" font-size="15" fill="#E5E7EB">Kinematic, useFullKinematicContacts = true. Exists only so triggers fire.</text>

  <!-- Component 5: GravityBody (highlighted) -->
  <rect x="420" y="640" width="760" height="140" rx="10" fill="#F59E0B" stroke="#B45309" stroke-width="3"/>
  <text x="800" y="678" text-anchor="middle" font-size="24" font-weight="700" fill="#000">GravityBody</text>
  <text x="800" y="708" text-anchor="middle" font-size="15" fill="#000">Our custom MonoBehaviour. The load-bearing component in the stack.</text>
  <text x="800" y="735" text-anchor="middle" font-size="15" fill="#000">Owns position, velocity, acceleration.</text>
  <text x="800" y="758" text-anchor="middle" font-size="15" fill="#000">Integrates Velocity Verlet in FixedUpdate.</text>

  <!-- Arrow pointing to GravityBody -->
  <g stroke="#F59E0B" stroke-width="2" fill="none">
    <path d="M 1260 710 L 1340 710" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
  </defs>
  <text x="1350" y="695" font-size="14" font-weight="700" fill="#F59E0B">Custom code.</text>
  <text x="1350" y="715" font-size="14" fill="#E5E7EB">Everything else is stock Unity.</text>
  <text x="1350" y="735" font-size="14" fill="#E5E7EB">Verlet step runs at 50 Hz;</text>
  <text x="1350" y="755" font-size="14" fill="#E5E7EB">writes transform.position.</text>

  <!-- Legend -->
  <g font-size="14">
    <rect x="80" y="810" width="18" height="18" fill="#6B7280" stroke="#374151"/>
    <text x="106" y="825" fill="#E5E7EB">Stock Unity component (boilerplate)</text>
    <rect x="370" y="810" width="18" height="18" fill="#F59E0B" stroke="#B45309"/>
    <text x="396" y="825" fill="#E5E7EB">Custom component (the interesting one)</text>
  </g>
</svg>
