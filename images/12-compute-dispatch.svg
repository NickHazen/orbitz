<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="1600" height="900" fill="#0F172A"/>

  <!-- Title -->
  <text x="800" y="64" text-anchor="middle" fill="#E5E7EB" font-size="36" font-weight="700">Compute shader dispatch model</text>
  <text x="800" y="100" text-anchor="middle" fill="#6B7280" font-size="20">One Dispatch() schedules a grid of thread groups. Each group runs a block of threads in parallel.</text>

  <!-- LEFT: Dispatch grid -->
  <g>
    <!-- Outer rectangle -->
    <rect x="80" y="160" width="760" height="620" fill="#0B1220" stroke="#3B82F6" stroke-width="3" rx="10"/>
    <text x="460" y="200" text-anchor="middle" fill="#DBEAFE" font-size="22" font-weight="700">Dispatch grid</text>
    <text x="460" y="232" text-anchor="middle" fill="#6B7280" font-size="16" font-family="ui-monospace, Menlo, Consolas">Dispatch(groupsX, groupsY, 1)</text>

    <!-- 4x2 visible thread group cells -->
    <!-- Each cell 150x150 with 16 gap, starting at (120, 280) -->
    <g>
      <!-- Row 1 -->
      <rect x="120" y="280" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>
      <rect x="290" y="280" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>
      <rect x="460" y="280" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>
      <rect x="630" y="280" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>
      <!-- Row 2 — highlight the first cell as "this is the one we zoom into" -->
      <rect x="120" y="450" width="150" height="150" fill="#3B82F6" stroke="#93C5FD" stroke-width="3" rx="6"/>
      <rect x="290" y="450" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>
      <rect x="460" y="450" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>
      <rect x="630" y="450" width="150" height="150" fill="#1E293B" stroke="#6B7280" stroke-width="2" rx="6"/>

      <!-- Cell labels -->
      <g fill="#9CA3AF" font-size="14" text-anchor="middle">
        <text x="195" y="362">group (0,0)</text>
        <text x="365" y="362">group (1,0)</text>
        <text x="535" y="362">group (2,0)</text>
        <text x="705" y="362">group (3,0)</text>
      </g>
      <g font-size="14" text-anchor="middle">
        <text x="195" y="532" fill="#FFFFFF" font-weight="700">group (0,1)</text>
        <text x="365" y="532" fill="#9CA3AF">group (1,1)</text>
        <text x="535" y="532" fill="#9CA3AF">group (2,1)</text>
        <text x="705" y="532" fill="#9CA3AF">group (3,1)</text>
      </g>

      <!-- "…more" hints -->
      <text x="460" y="660" text-anchor="middle" fill="#6B7280" font-size="18">… and groupsX · groupsY more groups</text>
      <text x="460" y="692" text-anchor="middle" fill="#6B7280" font-size="14">(each independent, scheduled on any GPU SM)</text>
    </g>

    <!-- Dispatch call example -->
    <g transform="translate(120,730)">
      <rect x="0" y="0" width="680" height="36" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6"/>
      <text x="340" y="24" text-anchor="middle" fill="#F59E0B" font-family="ui-monospace, Menlo, Consolas" font-size="16">shader.Dispatch(kernel, particleCount / 64, 1, 1);</text>
    </g>
  </g>

  <!-- Arrow bridging left → right -->
  <g stroke="#93C5FD" stroke-width="3" fill="none">
    <defs>
      <marker id="zoomArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#93C5FD"/>
      </marker>
    </defs>
    <path d="M 270 525 C 340 525, 420 525, 880 465" marker-end="url(#zoomArrow)"/>
  </g>
  <text x="590" y="460" text-anchor="middle" fill="#93C5FD" font-size="16">zoom into one group</text>

  <!-- RIGHT: Thread group zoomed (8x8 threads) -->
  <g>
    <rect x="880" y="160" width="640" height="620" fill="#0B1220" stroke="#8B5CF6" stroke-width="3" rx="10"/>
    <text x="1200" y="200" text-anchor="middle" fill="#E9D5FF" font-size="22" font-weight="700">One thread group, expanded</text>
    <text x="1200" y="232" text-anchor="middle" fill="#6B7280" font-size="16" font-family="ui-monospace, Menlo, Consolas">[numthreads(8, 8, 1)] — 64 threads per group</text>

    <!-- 8x8 grid of threads, each 42x42, gap 6, starting at (920, 280) => width 8*42+7*6 = 378 -->
    <g>
      <!-- Generate 64 squares; use debris purple (#8B5CF6) with one highlighted -->
      <!-- Layout: origin (920, 280) -->
      <g>
        <!-- 8 rows x 8 cols -->
        <!-- We'll inline them for precision -->
        <!-- row 0 -->
        <rect x="920" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="280" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 1 -->
        <rect x="920" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="328" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 2 — highlight one thread at (col 3, row 2) -->
        <rect x="920" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="376" width="42" height="42" rx="4" fill="#F59E0B" stroke="#B45309" stroke-width="3"/>
        <rect x="1112" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="376" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 3 -->
        <rect x="920" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="424" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 4 -->
        <rect x="920" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="472" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 5 -->
        <rect x="920" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="520" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 6 -->
        <rect x="920" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="568" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <!-- row 7 -->
        <rect x="920" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="968" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1016" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1064" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1112" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1160" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1208" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
        <rect x="1256" y="616" width="42" height="42" rx="4" fill="#8B5CF6" stroke="#5B21B6" stroke-width="1"/>
      </g>

      <!-- Axis labels -->
      <text x="1108" y="264" text-anchor="middle" fill="#6B7280" font-size="14">← GroupThreadID.x (0..7) →</text>
      <text x="908" y="470" transform="rotate(-90 908 470)" text-anchor="middle" fill="#6B7280" font-size="14">← GroupThreadID.y (0..7) →</text>

      <!-- Arrow from highlighted thread to annotation -->
      <defs>
        <marker id="kernelArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
        </marker>
      </defs>
      <g stroke="#F59E0B" stroke-width="2.5" fill="none">
        <path d="M 1106 416 C 1200 700, 1300 700, 1350 700" marker-end="url(#kernelArrow)"/>
      </g>

      <g transform="translate(920,712)">
        <rect x="0" y="0" width="580" height="58" fill="#0F172A" stroke="#F59E0B" stroke-width="2" rx="8"/>
        <text x="290" y="24" text-anchor="middle" fill="#F59E0B" font-size="15" font-family="ui-monospace, Menlo, Consolas">uint i = SV_DispatchThreadID.x;</text>
        <text x="290" y="46" text-anchor="middle" fill="#E5E7EB" font-size="15">reads pos[i], writes vel[i]  ·  one particle per thread</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <text x="800" y="836" text-anchor="middle" fill="#6B7280" font-size="16">Thread count total = groupsX · groupsY · 64. A million particles → 15,625 groups, all scheduled by one Dispatch() call.</text>
</svg>
