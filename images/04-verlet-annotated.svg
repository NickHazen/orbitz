<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1600" height="900" fill="#0F172A"/>

  <text x="800" y="54" text-anchor="middle" font-size="28" font-weight="700" fill="#E5E7EB">Velocity Verlet — annotated integration loop</text>
  <text x="800" y="84" text-anchor="middle" font-size="16" fill="#6B7280">Each code line mapped to its step in the four-step dance</text>

  <!-- Left column: pseudo-code with line numbers -->
  <rect x="60" y="120" width="900" height="620" rx="12" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <text x="80" y="158" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Velocity Verlet — one FixedUpdate tick</text>

  <!-- Line 1: Step 1 — half-kick + drift (position update) -->
  <rect x="60" y="175" width="900" height="90" rx="0" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="80" y="205" font-family="ui-monospace, monospace" font-size="17" fill="#F59E0B" font-weight="700">pos += vel * dt + acc * (0.5f * dt * dt);</text>
  <text x="80" y="240" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Taylor expansion: x(t+dt) = x(t) + v(t)·dt + ½·a(t)·dt²</text>
  <text x="80" y="258" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// The dt² term makes this second-order accurate in position</text>

  <!-- Line 2: Step 2 — recompute acceleration -->
  <rect x="60" y="275" width="900" height="90" rx="0" fill="#3B82F6" fill-opacity="0.12"/>
  <text x="80" y="305" font-family="ui-monospace, monospace" font-size="17" fill="#3B82F6" font-weight="700">Vector2 newAcc = GetGravityAcceleration(pos, G);</text>
  <text x="80" y="340" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Evaluate the gravity field at the NEW position</text>
  <text x="80" y="358" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Must be AFTER the position update — the derivation requires it</text>

  <!-- Line 3: Step 3 — half-kick again (velocity update) -->
  <rect x="60" y="375" width="900" height="90" rx="0" fill="#10B981" fill-opacity="0.12"/>
  <text x="80" y="405" font-family="ui-monospace, monospace" font-size="17" fill="#10B981" font-weight="700">vel += (acc + newAcc) * (0.5f * dt);</text>
  <text x="80" y="440" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Trapezoidal average of old and new acceleration</text>
  <text x="80" y="458" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// This is what makes Verlet symplectic — energy stays bounded</text>

  <!-- Line 4: Step 4 — store for next tick -->
  <rect x="60" y="475" width="900" height="70" rx="0" fill="#6B7280" fill-opacity="0.12"/>
  <text x="80" y="505" font-family="ui-monospace, monospace" font-size="17" fill="#E5E7EB" font-weight="700">acc = newAcc;</text>
  <text x="80" y="533" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Save for the next tick's averaged velocity update</text>

  <!-- Optional: drag after Verlet -->
  <rect x="60" y="560" width="900" height="70" rx="0" fill="none"/>
  <text x="80" y="590" font-family="ui-monospace, monospace" font-size="17" fill="#6B7280">float drag = planetoid.GetDragAtPoint(pos);</text>
  <text x="80" y="618" font-family="ui-monospace, monospace" font-size="17" fill="#6B7280">if (drag > 0f) vel *= (1f - drag * dt);</text>

  <text x="80" y="655" font-family="ui-monospace, monospace" font-size="17" fill="#E5E7EB">transform.position = pos;</text>
  <text x="80" y="680" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">// Write the result back to the GameObject</text>

  <!-- Right column: step badges with annotations -->
  <g>
    <!-- Step 1 badge -->
    <rect x="1020" y="175" width="520" height="90" rx="10" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
    <text x="1040" y="206" font-size="20" font-weight="700" fill="#000">1. Half-kick + drift</text>
    <text x="1040" y="232" font-size="14" fill="#000">Position advances using current</text>
    <text x="1040" y="252" font-size="14" fill="#000">velocity and acceleration. The ½·a·dt²</text>
    <text x="1040" y="252" font-size="14" fill="#000" dy="18">corrects for curvature mid-step.</text>

    <!-- Step 2 badge -->
    <rect x="1020" y="275" width="520" height="90" rx="10" fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
    <text x="1040" y="306" font-size="20" font-weight="700" fill="#fff">2. Recompute acceleration</text>
    <text x="1040" y="332" font-size="14" fill="#fff">Ask the planet what gravity is at</text>
    <text x="1040" y="352" font-size="14" fill="#fff">our new position. Includes softening.</text>

    <!-- Step 3 badge -->
    <rect x="1020" y="375" width="520" height="90" rx="10" fill="#10B981" stroke="#065F46" stroke-width="2"/>
    <text x="1040" y="406" font-size="20" font-weight="700" fill="#fff">3. Half-kick again</text>
    <text x="1040" y="432" font-size="14" fill="#fff">Velocity uses the average of old</text>
    <text x="1040" y="452" font-size="14" fill="#fff">and new accel. The symplectic magic.</text>

    <!-- Step 4 badge -->
    <rect x="1020" y="475" width="520" height="70" rx="10" fill="#6B7280" stroke="#374151" stroke-width="2"/>
    <text x="1040" y="506" font-size="20" font-weight="700" fill="#fff">4. Store for next tick</text>
    <text x="1040" y="531" font-size="14" fill="#fff">Next frame's "old" acc is this frame's "new."</text>
  </g>

  <!-- Connecting lines from badges to code lines -->
  <g stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4" opacity="0.5">
    <line x1="960" y1="220" x2="1020" y2="220"/>
    <line x1="960" y1="320" x2="1020" y2="320"/>
    <line x1="960" y1="420" x2="1020" y2="420"/>
    <line x1="960" y1="510" x2="1020" y2="510"/>
  </g>

  <!-- Bottom note -->
  <rect x="1020" y="580" width="520" height="130" rx="10" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="1040" y="610" font-size="15" font-weight="700" fill="#EF4444">After the Verlet loop</text>
  <text x="1040" y="636" font-size="14" fill="#E5E7EB">Drag is applied separately — it's not</text>
  <text x="1040" y="656" font-size="14" fill="#E5E7EB">part of the symplectic step. The preview</text>
  <text x="1040" y="676" font-size="14" fill="#E5E7EB">skips drag on purpose (shows the ideal</text>
  <text x="1040" y="696" font-size="14" fill="#E5E7EB">orbit before atmospheric erosion).</text>

  <!-- Legend -->
  <g transform="translate(60, 780)">
    <rect width="12" height="12" rx="2" fill="#F59E0B"/>
    <text x="20" y="11" font-size="13" fill="#E5E7EB">Position update</text>
    <rect x="170" width="12" height="12" rx="2" fill="#3B82F6"/>
    <text x="190" y="11" font-size="13" fill="#E5E7EB">Acceleration recompute</text>
    <rect x="390" width="12" height="12" rx="2" fill="#10B981"/>
    <text x="410" y="11" font-size="13" fill="#E5E7EB">Velocity update (symplectic)</text>
    <rect x="630" width="12" height="12" rx="2" fill="#6B7280"/>
    <text x="650" y="11" font-size="13" fill="#E5E7EB">Bookkeeping</text>
  </g>
</svg>
