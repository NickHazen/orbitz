<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
    <marker id="arrow-neutral" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arrow-orbiter" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-success" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/>
    </marker>
    <marker id="arrow-atmo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="8" fill="#0F172A"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" fill="#E5E7EB" font-size="15" font-weight="bold">Elastic impulse geometry</text>

  <!-- Particle i (orbiter orange) -->
  <circle cx="160" cy="280" r="28" fill="#F59E0B" opacity="0.25" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="160" cy="280" r="3" fill="#F59E0B"/>
  <text x="140" y="320" fill="#F59E0B" font-size="14" font-weight="bold">i</text>
  <text x="118" y="336" fill="#6B7280" font-size="11">m_i</text>

  <!-- Particle j (debris purple) -->
  <circle cx="330" cy="200" r="34" fill="#8B5CF6" opacity="0.25" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="330" cy="200" r="3" fill="#8B5CF6"/>
  <text x="348" y="196" fill="#8B5CF6" font-size="14" font-weight="bold">j</text>
  <text x="348" y="212" fill="#6B7280" font-size="11">m_j</text>

  <!-- Contact normal n-hat (neutral gray, from i center to j center) -->
  <line x1="160" y1="280" x2="318" y2="206" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow-neutral)"/>
  <text x="260" y="228" fill="#6B7280" font-size="13" font-weight="bold" transform="rotate(-25, 260, 228)">n</text>

  <!-- Relative velocity v_rel (dashed orange arrow on particle i) -->
  <line x1="160" y1="280" x2="260" y2="340" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-orbiter)"/>
  <text x="225" y="332" fill="#F59E0B" font-size="12">v_rel</text>
  <text x="225" y="348" fill="#6B7280" font-size="10">= v_i - v_j</text>

  <!-- Project v_rel onto normal: v_n component (green) -->
  <!-- The normal direction is roughly (170, -80) normalized ~ (0.905, -0.425) -->
  <!-- v_rel direction is roughly (100, 60), dot with n ~ 90.5 - 25.5 = 65, so v_n is significant -->
  <!-- Project: v_n along n from particle i -->
  <line x1="160" y1="280" x2="218" y2="253" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-success)"/>
  <text x="175" y="258" fill="#10B981" font-size="12" font-weight="bold">v_n</text>

  <!-- Dashed projection line from v_rel tip to v_n tip -->
  <line x1="260" y1="340" x2="218" y2="253" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Resulting impulse j (red arrow on i, opposite to v_n direction) -->
  <line x1="160" y1="280" x2="108" y2="304" stroke="#EF4444" stroke-width="3" marker-end="url(#arrow-atmo)"/>
  <text x="78" y="298" fill="#EF4444" font-size="13" font-weight="bold">j</text>

  <!-- Formula box -->
  <rect x="40" y="395" width="420" height="70" rx="6" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <text x="250" y="420" text-anchor="middle" fill="#E5E7EB" font-size="13" font-weight="bold">Impulse magnitude:</text>
  <text x="250" y="448" text-anchor="middle" fill="#EF4444" font-size="14" font-family="monospace">j = -(1+e) * v_n / (1/m_i + 1/m_j)</text>

  <!-- Legend -->
  <line x1="40" y="60" x2="65" y1="60" stroke="#6B7280" stroke-width="2"/>
  <text x="70" y="65" fill="#6B7280" font-size="11">Contact normal n</text>

  <line x1="40" y1="80" x2="65" y2="80" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="70" y="85" fill="#F59E0B" font-size="11">Relative velocity v_rel</text>

  <line x1="40" y1="100" x2="65" y2="100" stroke="#10B981" stroke-width="2.5"/>
  <text x="70" y="105" fill="#10B981" font-size="11">Normal component v_n</text>

  <line x1="40" y1="120" x2="65" y2="120" stroke="#EF4444" stroke-width="3"/>
  <text x="70" y="125" fill="#EF4444" font-size="11">Resulting impulse j</text>
</svg>