<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18">
  <rect width="1600" height="900" fill="#0F172A"/>
  <text x="800" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#E5E7EB">Series map — 21 guides across 7 tiers, aligned to 5 vision phases</text>

  <!-- Left column: tiers -->
  <g font-size="18" fill="#E5E7EB">
    <!-- Tier A -->
    <rect x="80" y="110" width="820" height="90" rx="10" fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
    <text x="100" y="145" font-weight="700" font-size="22" fill="#fff">Tier A — Foundations</text>
    <text x="100" y="180" fill="#fff">00 Series overview · 01 Unity 6 · 02 Codebase tour · 03 Orbital mechanics</text>

    <!-- Tier B -->
    <rect x="80" y="215" width="820" height="90" rx="10" fill="#F59E0B" stroke="#B45309" stroke-width="2"/>
    <text x="100" y="250" font-weight="700" font-size="22" fill="#000">Tier B — The core loop</text>
    <text x="100" y="285" fill="#000">04 Verlet integration · 05 Custom physics · 06 Slingshot &amp; preview</text>

    <!-- Tier C -->
    <rect x="80" y="320" width="820" height="90" rx="10" fill="#8B5CF6" stroke="#5B21B6" stroke-width="2"/>
    <text x="100" y="355" font-weight="700" font-size="22" fill="#fff">Tier C — The debris POC</text>
    <text x="100" y="390" fill="#fff">07 Architecture · 08 Collisions &amp; hashing · 09 Decay &amp; pickup</text>

    <!-- Tier D -->
    <rect x="80" y="425" width="820" height="90" rx="10" fill="#10B981" stroke="#065F46" stroke-width="2"/>
    <text x="100" y="460" font-weight="700" font-size="22" fill="#fff">Tier D — Scaling up</text>
    <text x="100" y="495" fill="#fff">10 Burst &amp; Jobs · 11 Porting debris · 12 GPU compute horizon</text>

    <!-- Tier E -->
    <rect x="80" y="530" width="820" height="90" rx="10" fill="#EF4444" stroke="#991B1B" stroke-width="2"/>
    <text x="100" y="565" font-weight="700" font-size="22" fill="#fff">Tier E — The tycoon layer</text>
    <text x="100" y="600" fill="#fff">13 Economy · 14 Automation · 15 Infrastructure</text>

    <!-- Tier F -->
    <rect x="80" y="635" width="820" height="90" rx="10" fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
    <text x="100" y="670" font-weight="700" font-size="22" fill="#fff">Tier F — Late game &amp; ship</text>
    <text x="100" y="705" fill="#fff">16 Idle &amp; offline · 17 Prestige · 18 Juice &amp; feel · 19 Build &amp; release</text>

    <!-- Tier G -->
    <rect x="80" y="740" width="820" height="90" rx="10" fill="#6B7280" stroke="#374151" stroke-width="2"/>
    <text x="100" y="775" font-weight="700" font-size="22" fill="#fff">Tier G — Practices</text>
    <text x="100" y="810" fill="#fff">20 Debugging &amp; profiling</text>
  </g>

  <!-- Right column: vision phases -->
  <g font-size="17" fill="#E5E7EB">
    <text x="1250" y="90" text-anchor="middle" font-size="22" font-weight="700" fill="#E5E7EB">Vision phases</text>

    <!-- Phase 1 -->
    <rect x="960" y="155" width="580" height="100" rx="10" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <text x="980" y="185" font-weight="700" fill="#F59E0B">Phase 1 — Suborbital</text>
    <text x="980" y="215" fill="#E5E7EB">Manual slingshot, everything falls.</text>
    <text x="980" y="240" fill="#6B7280" font-size="15">Covered by tiers A + B</text>

    <!-- Phase 2 -->
    <rect x="960" y="265" width="580" height="100" rx="10" fill="none" stroke="#10B981" stroke-width="2"/>
    <text x="980" y="295" font-weight="700" fill="#10B981">Phase 2 — First orbit</text>
    <text x="980" y="325" fill="#E5E7EB">First stable orbit, debris field arrives.</text>
    <text x="980" y="350" fill="#6B7280" font-size="15">Covered by tier C</text>

    <!-- Phase 3 -->
    <rect x="960" y="375" width="580" height="100" rx="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <text x="980" y="405" font-weight="700" fill="#8B5CF6">Phase 3 — Stable operations</text>
    <text x="980" y="435" fill="#E5E7EB">Multi-orbiter, auto-launch, scaling.</text>
    <text x="980" y="460" fill="#6B7280" font-size="15">Covered by tiers D + E</text>

    <!-- Phase 4 -->
    <rect x="960" y="485" width="580" height="100" rx="10" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <text x="980" y="515" font-weight="700" fill="#3B82F6">Phase 4 — Orbital infrastructure</text>
    <text x="980" y="545" fill="#E5E7EB">Stations, refineries, idle compounding.</text>
    <text x="980" y="570" fill="#6B7280" font-size="15">Covered by tiers E + F</text>

    <!-- Phase 5 -->
    <rect x="960" y="595" width="580" height="100" rx="10" fill="none" stroke="#EF4444" stroke-width="2"/>
    <text x="980" y="625" font-weight="700" fill="#EF4444">Phase 5 — Prestige</text>
    <text x="980" y="655" fill="#E5E7EB">Reset for compounding leverage.</text>
    <text x="980" y="680" fill="#6B7280" font-size="15">Covered by tier F</text>

    <!-- Cross-cutting -->
    <rect x="960" y="705" width="580" height="110" rx="10" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="980" y="735" font-weight="700" fill="#6B7280">Cross-cutting — Practices</text>
    <text x="980" y="765" fill="#E5E7EB">Debugging, profiling, shipping hygiene.</text>
    <text x="980" y="790" fill="#6B7280" font-size="15">Covered by tier G</text>
  </g>
</svg>
