<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14">
  <style>
    .bg         { fill: #FDF8EB; }
    .panel      { fill: #EDDFBF; fill-opacity: 0.55; stroke: #C9AE7C; stroke-opacity: 0.7; }
    .txt        { fill: #2E1F14; }
    .txt-dim    { fill: #6B4A2E; }
    .arrow-line { stroke: #8B857A; fill: none; }
    .arrow-head { fill: #8B857A; }
    .running    { fill: #D9A860; stroke: #8B6918; }
    .running-t  { fill: #2E1F14; }
    .paused     { fill: #6B8098; stroke: #394A5E; }
    .paused-t   { fill: #FFFFFF; }
    .killed     { fill: #B45B4D; stroke: #6F3028; }
    .killed-t   { fill: #FFFFFF; }
    .relaunch   { fill: #857F75; stroke: #4A443D; }
    .relaunch-t { fill: #FFFFFF; }
    .decision   { fill: #EDDFBF; stroke: #C9AE7C; }

    @media (prefers-color-scheme: dark) {
      .bg         { fill: #1E293B; }
      .panel      { fill: #0F172A; fill-opacity: 0.55; stroke: #334155; stroke-opacity: 0.8; }
      .txt        { fill: #E5E4DC; }
      .txt-dim    { fill: #A3A097; }
      .arrow-line { stroke: #A3A097; }
      .arrow-head { fill: #A3A097; }
      .decision   { fill: #1A2033; stroke: #334155; }
    }
  </style>

  <rect class="bg" width="1600" height="900"/>

  <text class="txt" x="800" y="50" text-anchor="middle" font-size="28" font-weight="700">One launch, choreographed</text>
  <text class="txt-dim" x="800" y="80" text-anchor="middle" font-size="15">Juice events along a single slingshot arc — every step has sight, sound, and touch cues</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path class="arrow-head" d="M0,0 L10,5 L0,10 Z"/>
    </marker>
  </defs>

  <!-- Timeline axis at y=400 -->
  <line class="arrow-line" x1="120" y1="400" x2="1480" y2="400" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="txt-dim" x="1492" y="404" font-size="11" font-style="italic">time →</text>

  <!-- Event centers at x = 180, 430, 680, 930, 1180, 1430 (250 apart) -->

  <!-- Time labels (above axis) -->
  <text class="txt-dim" x="180"  y="338" text-anchor="middle" font-size="11" font-style="italic">t = 0</text>
  <text class="txt-dim" x="430"  y="338" text-anchor="middle" font-size="11" font-style="italic">t = drag window</text>
  <text class="txt-dim" x="680"  y="338" text-anchor="middle" font-size="11" font-style="italic">t ≈ 1200 ms</text>
  <text class="txt-dim" x="930"  y="338" text-anchor="middle" font-size="11" font-style="italic">t + 16 ms</text>
  <text class="txt-dim" x="1180" y="338" text-anchor="middle" font-size="11" font-style="italic">t + 500 ms onward</text>
  <text class="txt-dim" x="1430" y="338" text-anchor="middle" font-size="11" font-style="italic">variable</text>

  <!-- Event markers (circles on axis) -->
  <circle class="running" cx="180"  cy="400" r="13" stroke-width="2"/>
  <circle class="paused"  cx="430"  cy="400" r="13" stroke-width="2"/>
  <circle class="killed"  cx="680"  cy="400" r="13" stroke-width="2"/>
  <circle class="decision" cx="930"  cy="400" r="13" stroke-width="2"/>
  <circle class="relaunch" cx="1180" cy="400" r="13" stroke-width="2"/>
  <circle class="running" cx="1430" cy="400" r="13" stroke-width="2"/>

  <!-- Event names (below markers) -->
  <text class="txt" x="180"  y="447" text-anchor="middle" font-size="16" font-weight="700">Press</text>
  <text class="txt" x="430"  y="447" text-anchor="middle" font-size="16" font-weight="700">Drag</text>
  <text class="txt" x="680"  y="447" text-anchor="middle" font-size="16" font-weight="700">Release</text>
  <text class="txt" x="930"  y="447" text-anchor="middle" font-size="16" font-weight="700">Spawn</text>
  <text class="txt" x="1180" y="447" text-anchor="middle" font-size="16" font-weight="700">Pickups</text>
  <text class="txt" x="1430" y="447" text-anchor="middle" font-size="16" font-weight="700">Orbit-end</text>

  <!-- Description cards below -->
  <g font-size="12">
    <rect class="panel" x="70"   y="475" width="220" height="155" rx="10" stroke-width="1"/>
    <text class="txt"     x="180" y="502" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.1em">CUES</text>
    <text class="txt"     x="180" y="528" text-anchor="middle">haptic tap</text>
    <text class="txt"     x="180" y="549" text-anchor="middle">UI flash</text>
    <text class="txt"     x="180" y="570" text-anchor="middle">band appears</text>
    <text class="txt-dim" x="180" y="600" text-anchor="middle" font-style="italic">the commit feels crisp</text>
    <text class="txt-dim" x="180" y="616" text-anchor="middle" font-style="italic">before physics does anything</text>

    <rect class="panel" x="320"  y="475" width="220" height="155" rx="10" stroke-width="1"/>
    <text class="txt"     x="430" y="502" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.1em">CUES</text>
    <text class="txt"     x="430" y="528" text-anchor="middle">dotted preview</text>
    <text class="txt"     x="430" y="549" text-anchor="middle">rising tension audio</text>
    <text class="txt"     x="430" y="570" text-anchor="middle">continuous rumble</text>
    <text class="txt-dim" x="430" y="600" text-anchor="middle" font-style="italic">tension builds; preview</text>
    <text class="txt-dim" x="430" y="616" text-anchor="middle" font-style="italic">matches the real arc</text>

    <rect class="panel" x="570"  y="475" width="220" height="155" rx="10" stroke-width="1"/>
    <text class="txt"     x="680" y="502" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.1em">CUES</text>
    <text class="txt"     x="680" y="528" text-anchor="middle">launch SFX</text>
    <text class="txt"     x="680" y="549" text-anchor="middle">screen shake ≤ 0.05 u</text>
    <text class="txt"     x="680" y="570" text-anchor="middle">particle poof · camera zoom</text>
    <text class="txt-dim" x="680" y="600" text-anchor="middle" font-style="italic">the punch of commit</text>
    <text class="txt-dim" x="680" y="616" text-anchor="middle" font-style="italic">four cues in &lt; 100 ms</text>

    <rect class="panel" x="820"  y="475" width="220" height="155" rx="10" stroke-width="1"/>
    <text class="txt"     x="930" y="502" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.1em">CUES</text>
    <text class="txt"     x="930" y="528" text-anchor="middle">orbiter sprite appears</text>
    <text class="txt"     x="930" y="549" text-anchor="middle">debut squash / stretch</text>
    <text class="txt-dim" x="930" y="585" text-anchor="middle" font-style="italic">proves the launch worked;</text>
    <text class="txt-dim" x="930" y="601" text-anchor="middle" font-style="italic">closes the release-→-birth</text>
    <text class="txt-dim" x="930" y="617" text-anchor="middle" font-style="italic">feedback loop &lt; 16 ms later</text>

    <rect class="panel" x="1070" y="475" width="220" height="155" rx="10" stroke-width="1"/>
    <text class="txt"     x="1180" y="502" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.1em">CUES</text>
    <text class="txt"     x="1180" y="528" text-anchor="middle">per-mass tic SFX</text>
    <text class="txt"     x="1180" y="549" text-anchor="middle">tiny bursts</text>
    <text class="txt"     x="1180" y="570" text-anchor="middle">counter pulse on tens</text>
    <text class="txt-dim" x="1180" y="600" text-anchor="middle" font-style="italic">each debris grain earns</text>
    <text class="txt-dim" x="1180" y="616" text-anchor="middle" font-style="italic">its own little dopamine</text>

    <rect class="panel" x="1320" y="475" width="220" height="155" rx="10" stroke-width="1"/>
    <text class="txt"     x="1430" y="502" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.1em">CUES</text>
    <text class="txt"     x="1430" y="528" text-anchor="middle">success chime</text>
    <text class="txt"     x="1430" y="549" text-anchor="middle">or atmosphere-burn fade</text>
    <text class="txt-dim" x="1430" y="585" text-anchor="middle" font-style="italic">outcome is legible:</text>
    <text class="txt-dim" x="1430" y="601" text-anchor="middle" font-style="italic">win or burn, audible</text>
    <text class="txt-dim" x="1430" y="617" text-anchor="middle" font-style="italic">without watching the arc</text>
  </g>

  <!-- Footer -->
  <text class="txt-dim" x="800" y="852" text-anchor="middle" font-size="13" font-style="italic">Every state transition gets a sight cue, a sound cue, and at least one haptic cue — the player never waits for signal.</text>
</svg>
